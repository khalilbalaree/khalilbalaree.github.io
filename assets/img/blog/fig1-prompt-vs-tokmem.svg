<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="Prompt-based control re-feeds a long prompt every query, while TokMem feeds a single memory token.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- titles -->
  <text x="180" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#9aa0a6">Prompt-based control</text>
  <text x="540" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#e08e45">TokMem</text>

  <!-- divider -->
  <line x1="360" y1="50" x2="360" y2="330" stroke="#888" stroke-opacity="0.3" stroke-dasharray="4 5"/>

  <!-- ===== LEFT: prompt-based ===== -->
  <!-- stacked long prompts, re-fed every query -->
  <g>
    <rect x="40" y="70" width="150" height="92" rx="8" fill="none" stroke="#888" stroke-opacity="0.35"/>
    <rect x="32" y="62" width="150" height="92" rx="8" fill="none" stroke="#888" stroke-opacity="0.55"/>
    <rect x="24" y="54" width="150" height="92" rx="8" fill="#88888822" stroke="#888"/>
    <!-- prompt text lines -->
    <line x1="40" y1="74" x2="158" y2="74" stroke="#888" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="88" x2="158" y2="88" stroke="#888" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="102" x2="158" y2="102" stroke="#888" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="116" x2="132" y2="116" stroke="#888" stroke-width="5" stroke-linecap="round"/>
    <text x="99" y="138" text-anchor="middle" font-size="11" fill="#9aa0a6">long prompt</text>
  </g>
  <text x="99" y="172" text-anchor="middle" font-size="11" fill="#9aa0a6">re-sent every query</text>

  <!-- arrow to LLM -->
  <line x1="186" y1="100" x2="244" y2="100" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM box (left) -->
  <rect x="246" y="74" width="86" height="56" rx="10" fill="none" stroke="#888" stroke-width="2"/>
  <text x="289" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#9aa0a6">LLM</text>
  <text x="289" y="116" text-anchor="middle" font-size="9.5" fill="#9aa0a6">re-reads it all</text>

  <!-- cost note -->
  <text x="180" y="300" text-anchor="middle" font-size="12.5" fill="#9aa0a6">cost grows with prompt length</text>
  <text x="180" y="320" text-anchor="middle" font-size="12.5" fill="#9aa0a6">every single time</text>

  <!-- ===== RIGHT: TokMem ===== -->
  <!-- single memory token -->
  <circle cx="430" cy="102" r="26" fill="#e08e4522" stroke="#e08e45" stroke-width="2"/>
  <text x="430" y="99" text-anchor="middle" font-size="13" font-weight="700" fill="#e08e45">tok</text>
  <text x="430" y="113" text-anchor="middle" font-size="11" fill="#e08e45">1</text>
  <text x="430" y="150" text-anchor="middle" font-size="11" fill="#e08e45">one memory token</text>
  <text x="430" y="167" text-anchor="middle" font-size="11" fill="#e08e45">per procedure</text>

  <!-- arrow to frozen LLM -->
  <line x1="460" y1="102" x2="514" y2="102" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- frozen LLM box (right) -->
  <rect x="516" y="74" width="96" height="56" rx="10" fill="none" stroke="#e08e45" stroke-width="2"/>
  <text x="564" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#e08e45">LLM</text>
  <text x="564" y="115" text-anchor="middle" font-size="9.5" fill="#e08e45">❄ frozen</text>

  <!-- cost note -->
  <text x="540" y="300" text-anchor="middle" font-size="12.5" fill="#e08e45">constant-size overhead</text>
  <text x="540" y="320" text-anchor="middle" font-size="12.5" fill="#e08e45">no matter the procedure</text>
</svg>
