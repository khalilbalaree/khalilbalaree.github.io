<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="A single memory token plays two roles: a procedure index and a generation control signal feeding a frozen LLM.">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#e08e45"/>
    </marker>
  </defs>

  <!-- the memory token in the center-left -->
  <circle cx="150" cy="160" r="44" fill="#e08e4522" stroke="#e08e45" stroke-width="2.5"/>
  <text x="150" y="155" text-anchor="middle" font-size="18" font-weight="700" fill="#e08e45">tok</text>
  <text x="150" y="178" text-anchor="middle" font-size="13" fill="#e08e45">one token</text>
  <text x="150" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#9aa0a6">a single trainable</text>
  <text x="150" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#9aa0a6">memory token</text>

  <!-- two roles fan out -->
  <!-- Role 1: index -->
  <line x1="194" y1="138" x2="318" y2="92" stroke="#e08e45" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="322" y="62" width="168" height="58" rx="9" fill="none" stroke="#888" stroke-width="1.5"/>
  <text x="406" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#9aa0a6">Role 1 · Index</text>
  <text x="406" y="106" text-anchor="middle" font-size="11.5" fill="#9aa0a6">which procedure is this?</text>

  <!-- Role 2: control signal -->
  <line x1="194" y1="182" x2="318" y2="228" stroke="#e08e45" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="322" y="200" width="168" height="58" rx="9" fill="none" stroke="#888" stroke-width="1.5"/>
  <text x="406" y="224" text-anchor="middle" font-size="14" font-weight="700" fill="#9aa0a6">Role 2 · Control signal</text>
  <text x="406" y="244" text-anchor="middle" font-size="11.5" fill="#9aa0a6">steers how it generates</text>

  <!-- both roles feed the frozen LLM -->
  <line x1="490" y1="91" x2="582" y2="148" stroke="#888" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="490" y1="229" x2="582" y2="172" stroke="#888" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="584" y="128" width="104" height="64" rx="11" fill="none" stroke="#e08e45" stroke-width="2.5"/>
  <text x="636" y="156" text-anchor="middle" font-size="16" font-weight="700" fill="#e08e45">LLM</text>
  <text x="636" y="176" text-anchor="middle" font-size="11" fill="#e08e45">❄ frozen</text>
</svg>
